<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunnyside Protocol - Player</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #39ff14; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .hud-container { border: 2px solid #39ff14; margin: 20px; padding: 20px; box-shadow: 0 0 15px #39ff14; position: relative; height: 85vh; display: flex; flex-direction: column; justify-content: center; }
        #status { font-size: 1.2rem; margin: 20px 0; color: #ff00ff; font-weight: bold; }
        .btn { background: #ff00ff; border: none; color: white; padding: 25px; font-size: 1.5rem; cursor: pointer; display: none; width: 100%; font-weight: bold; box-shadow: 0 0 20px #ff00ff; border-radius: 10px; }
        #player-id { font-size: 0.8rem; opacity: 0.6; position: absolute; bottom: 10px; width: 100%; left: 0; }
    </style>
</head>
<body>
    <div class="hud-container">
        <h1>SYSTEM ACTIVE</h1>
        <div id="status">LOCATING SATELLITES...</div>
        <button id="kill-btn" class="btn">ELIMINEER TARGET</button>
        <div id="player-id">Scanner ID: --</div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
          authDomain: "tradingpost-57b20.firebaseapp.com",
          databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "tradingpost-57b20",
          storageBucket: "tradingpost-57b20.firebasestorage.app",
          messagingSenderId: "358205969306",
          appId: "1:358205969306:web:b0440ef5815a21d5fca023",
          measurementId: "G-ERK90MPVWR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('playerName') || prompt("Wat is je naam?");
        if(!myId) { myId = "Toy_" + Math.floor(Math.random() * 1000); }
        localStorage.setItem('playerName', myId);
        document.getElementById('player-id').innerText = "Scanner ID: " + myId;

        let myRole = "toy"; 
        let myStatus = "alive";

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(position => {
                const { latitude, longitude } = position.coords;
                db.ref('players/' + myId).update({
                    lat: latitude,
                    lng: longitude,
                    last_seen: Date.now(),
                    name: myId,
                    status: myStatus,
                    role: myRole
                });
                checkProximity(latitude, longitude);
            }, err => {
                document.getElementById('status').innerText = "GPS ERROR: Zet locatie aan!";
            }, { enableHighAccuracy: true });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function checkProximity(myLat, myLng) {
            if(myRole !== "traitor" || myStatus === "dead") return;
            
            db.ref('players').once('value', snapshot => {
                const players = snapshot.val();
                let targetId = null;

                for (let id in players) {
                    if (id !== myId && players[id].status === "alive") {
                        const dist = getDistance(myLat, myLng, players[id].lat, players[id].lng);
                        if (dist < 10) { // Binnen 10 meter
                            targetId = id;
                        }
                    }
                }
                
                const btn = document.getElementById('kill-btn');
                if (targetId) {
                    btn.style.display = 'block';
                    btn.onclick = () => {
                        db.ref('players/' + targetId).update({ status: 'dead' });
                        alert("DOELWIT UITGESCHAKELD!");
                    };
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        db.ref('players/' + myId).on('value', snap => {
            const data = snap.val();
            if(data) {
                myRole = data.role || "toy";
                myStatus = data.status || "alive";
                document.getElementById('status').innerText = (myStatus === 'dead') ? 'OFFLINE (GEËLIMINEERD)' : (myRole === 'traitor' ? 'JE BENT DE VERRADER' : 'STATUS: VEILIG');
                if(myStatus === 'dead') document.body.style.filter = "grayscale(1)";
            }
        });
    </script>
</body>
</html>
