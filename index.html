<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SUNNYSIDE HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 0; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        #radar-map { height: 250px; width: 100%; border: 1px solid #f0f; display: none; margin-top: 10px; }
        .btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 20px; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; }
        #kill-btn { border-color: #f0f; color: #f0f; display: none; }
        .lights-out { filter: brightness(0.05); }
    </style>
</head>
<body>

    <div id="game-ui" class="screen">
        <h1 id="role-text">VERBINDEN...</h1>
        <div id="points-display">Punten: 0</div>
        
        <div id="radar-container">
            <p id="radar-label" style="display:none; color:#f0f; font-size: 10px;">TRAITOR RADAR (NO NAMES)</p>
            <div id="radar-map"></div>
        </div>

        <button id="kill-btn" class="btn" onclick="doKill()">ELIMINEER DOELWIT</button>
        
        <div id="sabo-panel" style="display:none; margin-top: 20px;">
            <button onclick="sabo('lights')" style="color:red">SABOTAGE: LICHTEN</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { /* JOUW CONFIG HIER */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Naam?");
        localStorage.setItem('pName', myName);

        let myLat, myLng, myRole, myStatus, victimId = null;
        let radarMap, radarMarkers = {};

        // GPS & Aanmelden
        db.ref('players/'+myName).update({name: myName, state: 'pending', status:'alive', role:'toy', lat:52, lng:5});
        
        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            db.ref('players/'+myName).update({lat: myLat, lng: myLng});
            if(radarMap) radarMap.panTo([myLat, myLng]);
            checkKill();
        }, null, {enableHighAccuracy:true});

        function checkKill() {
            db.ref('players').once('value', snap => {
                const ps = snap.val(); victimId = null;
                for(let id in ps) {
                    if(id !== myName && ps[id].status === 'alive' && ps[id].role !== 'traitor' && dist(myLat, myLng, ps[id].lat, ps[id].lng) < 10) {
                        victimId = id; break;
                    }
                }
                document.getElementById('kill-btn').style.display = (myRole === 'traitor' && victimId) ? 'block' : 'none';
            });
        }

        function doKill() { if(victimId) db.ref('players/'+victimId).update({status:'dead'}); }
        function sabo(t) { db.ref('game_settings/sabotage').set({active: t!=='none', type: t}); }

        // Database Sync
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = data.players[myName];
            if(!me) return;

            myRole = me.role; myStatus = me.status;
            document.getElementById('role-text').innerText = myRole.toUpperCase();
            document.getElementById('points-display').innerText = "Punten: " + (me.points || 0);
            
            if(myStatus === 'dead') document.body.style.filter = "grayscale(1) brightness(0.2)";

            // Traitor Radar
            if(myRole === 'traitor' && myStatus === 'alive') {
                document.getElementById('radar-map').style.display = 'block';
                document.getElementById('radar-label').style.display = 'block';
                document.getElementById('sabo-panel').style.display = 'block';
                if(!radarMap) {
                    radarMap = L.map('radar-map', {zoomControl: false}).setView([myLat, myLng], 17);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
                }
                // Update markers zonder namen
                for(let id in data.players) {
                    const p = data.players[id];
                    if(p.state === 'active' && p.status === 'alive') {
                        if(radarMarkers[id]) radarMarkers[id].setLatLng([p.lat, p.lng]);
                        else radarMarkers[id] = L.circleMarker([p.lat, p.lng], {radius: 5, color: id === myName ? 'lime' : 'red'}).addTo(radarMap);
                    }
                }
            }
        });

        function dist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const dLat = (la2-la1) * Math.PI/180;
            const dLon = (lo2-lo1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
