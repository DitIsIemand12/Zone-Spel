<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>PLAYER HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        #radar-map { height: 280px; width: 100%; border: 2px solid #333; border-radius: 50%; margin: 15px 0; display: block; }
        .btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #ann-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; background: orange; color: #000; padding: 15px; z-index: 1000; font-weight: bold; }
        #sabo-warn-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; background: red; color: white; padding: 10px; z-index: 1001; font-weight: bold; }
        .lights-out { filter: brightness(0.05); }
    </style>
</head>
<body>
    <div id="ann-overlay"><span id="ann-text"></span> <button onclick="this.parentElement.style.display='none'">X</button></div>
    <div id="sabo-warn-overlay">⚠️ SABOTAGE ACTIEF! ⚠️</div>

    <div id="ui" class="screen">
        <h1 id="status-text">LADEN...</h1>
        <div id="points">Score: 0</div>
        <div id="radar-map"></div>
        <div id="traitor-controls" style="display:none;">
            <button id="kill-btn" class="btn" style="color:#f0f; border-color:#f0f;">KILL</button>
            <button id="sabo-btn-hud" class="btn" style="color:red; border-color:red;" onclick="triggerSaboLocal()">SABOTAGE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Wat is je naam?");
        localStorage.setItem('pName', myName);
        let myLat, myLng, myRole, myStatus, radarMap, markers = {}, lastAnn = 0;
        let lastUpdateTime = 0;
        const throttleTime = 4000;

        db.ref('players/'+myName).once('value', s => {
            if(!s.exists()) db.ref('players/'+myName).set({name: myName, state: 'pending', role: 'toy', status: 'alive', points: 0, lat: 52, lng: 5});
        });

        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            const nu = Date.now();
            if (nu - lastUpdateTime > throttleTime) {
                db.ref('players/'+myName).update({lat: myLat, lng: myLng});
                lastUpdateTime = nu;
            }
            if(radarMap) radarMap.panTo([myLat, myLng]);
        }, null, {enableHighAccuracy:true});

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const me = players[myName];
            
            // Wipe markers als data leeg is
            if(Object.keys(players).length === 0) {
                for(let id in markers) { if(radarMap) radarMap.removeLayer(markers[id]); }
                markers = {};
            }

            if(!me) { document.getElementById('status-text').innerText = "VERBINDEN..."; return; }
            if(me.state === 'pending') { document.getElementById('status-text').innerText = "WACHT OP TOELATING..."; return; }
            
            myRole = me.role; myStatus = me.status;
            document.getElementById('status-text').innerText = myRole.toUpperCase();
            document.getElementById('points').innerText = "Score: " + (me.points || 0);

            // Sabotage Melding
            const isSabo = data.game_settings?.sabotage?.active;
            document.getElementById('sabo-warn-overlay').style.display = isSabo ? 'block' : 'none';

            // Radar
            if(data.game_settings?.state === 'playing') {
                if(!radarMap) {
                    radarMap = L.map('radar-map', {zoomControl:false, attributionControl:false}).setView([myLat, myLng], 18);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
                }
                for(let id in players) {
                    const p = players[id];
                    if(p.state !== 'active' || p.status === 'dead') {
                        if(markers[id]) { radarMap.removeLayer(markers[id]); delete markers[id]; }
                        continue;
                    }
                    let col = null;
                    if(myRole === 'traitor') {
                        if(p.role === 'post') continue;
                        col = (id === myName) ? 'blue' : (p.role === 'traitor' ? 'pink' : 'green');
                    } else {
                        col = (id === myName) ? 'blue' : (p.role === 'post' ? 'yellow' : 'green');
                    }
                    if(col) {
                        if(markers[id]) markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                        else markers[id] = L.circleMarker([p.lat, p.lng], {radius:6, color:col, fillOpacity:0.8}).addTo(radarMap);
                    }
                }
                // Kill logic (Traitors)
                if(myRole === 'traitor') {
                    document.getElementById('traitor-controls').style.display = 'block';
                    let vic = null;
                    for(let id in players) if(id!==myName && players[id].role==='toy' && players[id].status==='alive' && dist(myLat,myLng,players[id].lat,players[id].lng) < 10) vic = id;
                    const kb = document.getElementById('kill-btn');
                    if(vic) {
                        kb.innerText = "KILL: " + players[vic].name; kb.disabled = false;
                        kb.onclick = () => {
                            db.ref('players/'+vic).update({status:'dead'});
                            db.ref('players/'+myName+'/points').transaction(p => (p||0) + (data.game_settings?.kill_reward || 50));
                        };
                    } else { kb.innerText = "ZOEK TOY..."; kb.disabled = true; }
                }
            }
            document.getElementById('ui').className = (isSabo && myRole !== 'traitor') ? 'screen lights-out' : 'screen';
        });

        function triggerSaboLocal() {
            db.ref('players').once('value', s => {
                let lats = [], lngs = [];
                s.forEach(p => { if(p.val().state === 'active' && p.val().role !== 'post') { lats.push(p.val().lat); lngs.push(p.val().lng); }});
                db.ref('game_settings/sabotage').set({ active: true, lat: lats.reduce((a,b)=>a+b)/lats.length, lng: lngs.reduce((a,b)=>a+b)/lngs.length });
            });
        }
        function dist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const a = Math.sin(((la2-la1)*Math.PI/180)/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(((lo2-lo1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
