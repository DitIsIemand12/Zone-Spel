<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SUNNYSIDE HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        #radar-map { height: 250px; width: 100%; border: 1px solid #f0f; border-radius: 50%; margin: 10px 0; display: none; }
        .btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .lights-out { filter: brightness(0.05); }
        #sabo-alert { display: none; position: fixed; top: 0; width: 100%; background: red; color: white; padding: 10px; z-index: 100; font-weight: bold; }
        #ann-box { display: none; position: fixed; top: 20%; left: 5%; width: 90%; background: orange; color: #000; padding: 20px; z-index: 1000; border: 5px solid white; }
    </style>
</head>
<body>

    <div id="ann-box"><h2 id="ann-txt"></h2><button class="btn" style="border-color:black; color:black" onclick="this.parentElement.style.display='none'">OK</button></div>
    <div id="sabo-alert">⚠️ LICHTEN UIT! GA NAAR FIX POINT ⚠️<br><span id="fix-dist"></span></div>

    <div id="main-ui" class="screen">
        <h1 id="role-text">LADEN...</h1>
        <div id="points">Punten: 0</div>
        <div id="radar-map"></div>
        <button id="kill-btn" class="btn" style="border-color:#f0f; color:#f0f; display:none" onclick="doKill()">ELIMINEER</button>
        <button id="sabo-btn" class="btn" style="border-color:red; color:red; display:none" onclick="startSabo()">SABOTAGE LICHTEN</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Naam?");
        localStorage.setItem('pName', myName);
        let myLat, myLng, myRole, myStatus, radarMap, markers = {}, lastAnn = 0;

        db.ref('players/'+myName).update({name: myName, state: 'pending', status:'alive', role:'toy', lat:52, lng:5});

        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            db.ref('players/'+myName).update({lat: myLat, lng: myLng});
            if(radarMap) radarMap.panTo([myLat, myLng]);
        }, null, {enableHighAccuracy:true});

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = data.players?.[myName];
            if(!me) return;
            myRole = me.role; myStatus = me.status;

            document.getElementById('role-text').innerText = (me.state==='pending') ? "WACHT OP TOELATING" : myRole.toUpperCase();
            document.getElementById('points').innerText = "Score: " + (me.points || 0);

            // Kill & Sabo Buttons
            if(myRole === 'traitor' && myStatus === 'alive') {
                document.getElementById('sabo-btn').style.display = data.game_settings?.sabotage?.active ? 'none' : 'block';
                // Kill check
                let vic = null;
                for(let id in data.players) {
                    let p = data.players[id];
                    if(id!==myName && p.status==='alive' && p.role==='toy' && dist(myLat, myLng, p.lat, p.lng) < 10) vic = id;
                }
                document.getElementById('kill-btn').style.display = vic ? 'block' : 'none';
                if(vic) document.getElementById('kill-btn').onclick = () => db.ref('players/'+vic).update({status:'dead'});
            }

            // Sabotage UI
            const sab = data.game_settings?.sabotage;
            if(sab?.active) {
                document.getElementById('sabo-alert').style.display = 'block';
                document.getElementById('fix-dist').innerText = `Afstand: ${dist(myLat, myLng, sab.lat, sab.lng).toFixed(0)}m | Fixers: ${sab.fix_count || 0}/3`;
                if(myRole !== 'traitor') document.getElementById('main-ui').classList.add('lights-out');
            } else {
                document.getElementById('sabo-alert').style.display = 'none';
                document.getElementById('main-ui').classList.remove('lights-out');
            }

            // Announcements
            if(data.game_settings?.announcement?.ts > lastAnn) {
                document.getElementById('ann-txt').innerText = data.game_settings.announcement.msg;
                document.getElementById('ann-box').style.display = 'block';
                lastAnn = data.game_settings.announcement.ts;
            }

            // Radar
            if((myRole==='traitor' || myRole==='post') && myStatus==='alive') {
                document.getElementById('radar-map').style.display = 'block';
                if(!radarMap) {
                    radarMap = L.map('radar-map', {zoomControl: false, attributionControl: false}).setView([myLat, myLng], 18);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
                }
                for(let id in data.players) {
                    const p = data.players[id];
                    if(p.state==='active' && p.status==='alive') {
                        let c = (id===myName) ? 'lime' : (myRole==='traitor' ? 'red' : 'white');
                        if(markers[id]) markers[id].setLatLng([p.lat, p.lng]);
                        else markers[id] = L.circleMarker([p.lat, p.lng], {radius: 5, color: c}).addTo(radarMap);
                    }
                }
            }
        });

        function startSabo() {
            db.ref('players').once('value', s => {
                let lats = [], lngs = [];
                s.forEach(p => { if(p.val().state==='active' && p.val().role!=='post') { lats.push(p.val().lat); lngs.push(p.val().lng); } });
                db.ref('game_settings/sabotage').set({ active: true, lat: lats.reduce((a,b)=>a+b)/lats.length, lng: lngs.reduce((a,b)=>a+b)/lngs.length });
            });
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const a = Math.sin(((la2-la1)*Math.PI/180)/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(((lo2-lo1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
