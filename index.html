<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunnyside Protocol - Player</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #39ff14; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .hud-container { border: 2px solid #39ff14; margin: 20px; padding: 20px; box-shadow: 0 0 15px #39ff14; position: relative; height: 80vh; }
        .scanline { width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,.1) 50%), linear-gradient(90deg, rgba(255,0,0,.06), rgba(0,255,0,.02), rgba(0,0,255,.06)); z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none; position: absolute; top: 0; left: 0; }
        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        #status { font-size: 1.5rem; margin: 20px 0; color: #ff00ff; }
        .btn { background: transparent; border: 2px solid #ff00ff; color: #ff00ff; padding: 20px 40px; font-size: 1.5rem; cursor: pointer; display: none; margin-top: 20px; }
        .btn:active { background: #ff00ff; color: #000; }
        #task-alert { color: yellow; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="hud-container">
        <h1>Sunnyside HUD v1.0</h1>
        <div id="player-name">Laden...</div>
        <div id="status">INITIALISEREN...</div>
        <div id="task-alert">LOCATIE BEREIKT: VOER TAAK UIT!</div>
        <button id="kill-btn" class="btn">ELIMINEER</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
          authDomain: "tradingpost-57b20.firebaseapp.com",
          databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "tradingpost-57b20",
          storageBucket: "tradingpost-57b20.firebasestorage.app",
          messagingSenderId: "358205969306",
          appId: "1:358205969306:web:b0440ef5815a21d5fca023",
          measurementId: "G-ERK90MPVWR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = prompt("Voer je naam in:") || "Anoniem";
        let myRole = "toy"; 
        let myStatus = "alive";

        // GPS Logica
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(position => {
                const { latitude, longitude } = position.coords;
                db.ref('players/' + myId).update({
                    lat: latitude,
                    lng: longitude,
                    last_seen: Date.now(),
                    name: myId,
                    status: myStatus,
                    role: myRole
                });
                checkProximity(latitude, longitude);
            }, err => console.error(err), { enableHighAccuracy: true });
        }

        // Haversine formule voor afstandsberekening
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // meter
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Check voor Kill Button en Taken
        function checkProximity(myLat, myLng) {
            db.ref('players').once('value', snapshot => {
                const players = snapshot.val();
                let showKill = false;

                for (let id in players) {
                    if (id !== myId && players[id].status === "alive") {
                        const dist = getDistance(myLat, myLng, players[id].lat, players[id].lng);
                        if (myRole === "traitor" && dist < 10) {
                            showKill = true;
                            document.getElementById('kill-btn').onclick = () => eliminate(id);
                        }
                    }
                }
                document.getElementById('kill-btn').style.display = showKill ? 'inline-block' : 'none';
            });
        }

        function eliminate(targetId) {
            db.ref('players/' + targetId).update({ status: 'dead' });
            alert("DOELWIT GEËLIMINEERD");
        }

        // Luister naar rol-updates
        db.ref('players/' + myId).on('value', snap => {
            const data = snap.val();
            if(data) {
                myRole = data.role;
                myStatus = data.status;
                document.getElementById('status').innerText = data.status === 'dead' ? 'STATUS: GEËLIMINEERD' : 'STATUS: ACTIEF';
                if(data.status === 'dead') document.body.style.filter = "grayscale(1)";
            }
        });
    </script>
</body>
</html>
