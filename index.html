<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunnyside HUD</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #39ff14; font-family: monospace; margin: 0; text-align: center; overflow: hidden; }
        #debug-bar { background: #222; font-size: 0.6rem; padding: 5px; color: #aaa; }
        .hud { height: 90vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .btn { border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px; }
        #kill-btn { background: #ff00ff; color: white; display: none; }
        #task-btn { background: #39ff14; color: black; display: none; }
        #traitor-panel { display: none; background: #200; padding: 10px; border: 1px solid red; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .wire { width: 80%; height: 40px; margin: 10px; border-radius: 5px; border: 2px solid #fff; }
        .lights-out { filter: brightness(0.05); }
    </style>
</head>
<body>
    <div id="debug-bar">GPS: Zoeken... | DB: Verbinden...</div>

    <div class="hud" id="hud-main">
        <div>
            <h1 id="display-role">INITIALISEREN</h1>
            <p id="display-status">Wachten op systeem...</p>
        </div>

        <div>
            <button id="task-btn" class="btn" onclick="openTask()">⚠️ START OPDRACHT</button>
            <button id="kill-btn" class="btn">ELIMINEER DOELWIT</button>
        </div>

        <div id="traitor-panel">
            <p style="color:red">SABOTAGE PANEL</p>
            <button onclick="sabo('lights')" style="background:red">LICHTEN UIT</button>
            <button onclick="sabo('none')" style="background:green">REPAREREN</button>
        </div>
    </div>

    <!-- OPDRACHT MODAL -->
    <div id="task-modal" class="modal">
        <h2 id="modal-title">OPDRACHT</h2>
        <div id="game-content" style="width: 100%;"></div>
        <button onclick="closeTask()" style="margin-top: 30px; background: none; color: white; border: 1px solid white;">AFBREKEN</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('playerName') || prompt("Naam?");
        localStorage.setItem('playerName', myId);

        let myLat, myLng, myRole = 'toy', myStatus = 'alive', activeTaskData = null;

        // GPS Logica met Debugging
        navigator.geolocation.watchPosition(pos => {
            myLat = pos.coords.latitude;
            myLng = pos.coords.longitude;
            document.getElementById('debug-bar').innerText = `GPS OK (${myLat.toFixed(4)}) | DB: Verbonden`;
            
            db.ref('players/' + myId).update({
                lat: myLat, lng: myLng, name: myId, last_seen: Date.now(), 
                role: myRole, status: myStatus
            });
            checkTriggers();
        }, err => {
            document.getElementById('debug-bar').innerText = "GPS FOUT: Zet locatie aan en gebruik HTTPS!";
        }, { enableHighAccuracy: true });

        function checkTriggers() {
            db.ref().once('value', snap => {
                const data = snap.val() || {};
                const tasks = data.tasks || {};
                activeTaskData = null;

                for(let tid in tasks) {
                    const dist = getDist(myLat, myLng, tasks[tid].lat, tasks[tid].lng);
                    if(dist < 15) { // 15 meter radius
                        activeTaskData = tasks[tid];
                        break;
                    }
                }
                document.getElementById('task-btn').style.display = activeTaskData ? 'block' : 'none';

                // Kill logic
                if(myRole === 'traitor' && myStatus === 'alive') {
                    let victim = null;
                    const players = data.players || {};
                    for(let pid in players) {
                        if(pid !== myId && players[pid].status === 'alive' && getDist(myLat, myLng, players[pid].lat, players[pid].lng) < 10) {
                            victim = pid; break;
                        }
                    }
                    const kb = document.getElementById('kill-btn');
                    kb.style.display = victim ? 'block' : 'none';
                    kb.onclick = () => db.ref('players/' + victim).update({status: 'dead'});
                }
            });
        }

        // --- CREATIEVE OPDRACHTEN ---
        function openTask() {
            const modal = document.getElementById('task-modal');
            const content = document.getElementById('game-content');
            modal.style.display = 'flex';
            document.getElementById('modal-title').innerText = activeTaskData.name;

            if(activeTaskData.type === "1") { // DRADEN
                content.innerHTML = '<p>Tik de draden aan in volgorde: ROOD, BLAUW, GEEL</p>' +
                    '<div class="wire" id="w1" style="background:red" onclick="wire(1)"></div>' +
                    '<div class="wire" id="w2" style="background:blue" onclick="wire(2)"></div>' +
                    '<div class="wire" id="w3" style="background:yellow" onclick="wire(3)"></div>';
                window.wireStep = 1;
            } else if(activeTaskData.type === "2") { // CODE
                content.innerHTML = '<p>Voer de geheime code in: 8842</p><input type="number" id="code-in" style="font-size:2rem; width:80%"><br><button onclick="checkCode()" class="btn">SUBMIT</button>';
            } else { // UPLOAD
                content.innerHTML = '<p>Data versturen naar HQ...</p><div id="bar" style="width:0%; height:20px; background:lime"></div>';
                let w = 0;
                let iv = setInterval(() => {
                    w += 5; document.getElementById('bar').style.width = w + "%";
                    if(w>=100) { clearInterval(iv); finishTask(); }
                }, 200);
            }
        }

        function wire(n) {
            if(n === window.wireStep) {
                document.getElementById('w'+n).style.opacity = "0.2";
                window.wireStep++;
                if(window.wireStep > 3) finishTask();
            } else { alert("FOUTE VOLGORDE!"); closeTask(); }
        }

        function checkCode() {
            if(document.getElementById('code-in').value === "8842") finishTask();
            else alert("CODE ONJUIST");
        }

        function finishTask() { alert("OPDRACHT VOLTOOID!"); closeTask(); }
        function closeTask() { document.getElementById('task-modal').style.display = 'none'; }
        function sabo(t) { db.ref('game_settings/sabotage').set({active: t!=='none', type: t}); }

        // Afstandsberekening
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Database Listeners
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = data.players?.[myId];
            if(me) {
                myRole = me.role; myStatus = me.status;
                document.getElementById('display-role').innerText = myRole.toUpperCase();
                document.getElementById('display-status').innerText = "STATUS: " + myStatus.toUpperCase();
                document.getElementById('traitor-panel').style.display = (myRole === 'traitor') ? 'block' : 'none';
                if(myStatus === 'dead') document.body.style.background = "#400";
            }
            const s = data.game_settings?.sabotage;
            document.getElementById('hud-main').classList.toggle('lights-out', s?.active && s?.type === 'lights' && myRole !== 'traitor');
        });
    </script>
</body>
</html>
