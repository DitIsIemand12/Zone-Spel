<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SUNNYSIDE HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        #radar-map { height: 200px; width: 100%; border: 1px solid #f0f; border-radius: 50%; display: none; }
        .btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .sabo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.2); z-index: 100; border: 10px solid red; box-sizing: border-box; pointer-events: none; }
        .lights-out { filter: brightness(0.05); }
        #announcement-box { display: none; position: fixed; top: 0; width: 100%; background: orange; color: black; padding: 20px; z-index: 1000; }
    </style>
</head>
<body>

    <div id="announcement-box">
        <h2 id="ann-msg"></h2>
        <button onclick="this.parentElement.style.display='none'">SLUITEN</button>
    </div>

    <div id="sabo-alert" class="sabo-overlay">
        <h1 style="color:red; background:black; margin-top: 20%;">⚠️ LICHTEN UIT ⚠️</h1>
        <p id="fix-dist" style="color:white; background:black;"></p>
    </div>

    <div id="game-ui" class="screen">
        <h1 id="role-text">VERBINDEN...</h1>
        <div id="points-display">Score: 0</div>
        <div id="radar-map"></div>
        <button id="kill-btn" class="btn" style="border-color:#f0f; color:#f0f; display:none" onclick="doKill()">ELIMINEER</button>
        <button id="sabo-btn" class="btn" style="border-color:red; color:red; display:none" onclick="triggerSabo()">SABOTAGE LICHTEN</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Naam?");
        localStorage.setItem('pName', myName);
        let myLat, myLng, myRole, myStatus, radarMap, markers = {}, lastAnn = 0;

        db.ref('players/'+myName).update({name: myName, state: 'pending', status:'alive', role:'toy', lat:52, lng:5});

        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            db.ref('players/'+myName).update({lat: myLat, lng: myLng});
            if(radarMap) radarMap.panTo([myLat, myLng]);
            checkKillAndSabo();
        }, null, {enableHighAccuracy:true});

        function checkKillAndSabo() {
            db.ref().once('value', snap => {
                const data = snap.val();
                const ps = data.players;
                // Kill logic
                let victim = null;
                for(let id in ps) if(id!==myName && ps[id].status==='alive' && ps[id].role==='toy' && dist(myLat, myLng, ps[id].lat, ps[id].lng) < 10) victim = id;
                document.getElementById('kill-btn').style.display = (myRole==='traitor' && victim) ? 'block' : 'none';
                if(victim) document.getElementById('kill-btn').onclick = () => db.ref('players/'+victim).update({status:'dead'});

                // Sabotage Fix logic
                const sab = data.game_settings?.sabotage;
                if(sab?.active) {
                    const d = dist(myLat, myLng, sab.lat, sab.lng);
                    db.ref('players/'+myName+'/is_fixing').set(d < 15);
                }
            });
        }

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = data.players?.[myName];
            if(!me) return;
            myRole = me.role; myStatus = me.status;

            document.getElementById('role-text').innerText = myRole.toUpperCase();
            document.getElementById('points-display').innerText = "Score: " + (me.points || 0);
            document.getElementById('sabo-btn').style.display = (myRole === 'traitor' && !data.game_settings?.sabotage?.active) ? 'block' : 'none';

            // Announcements
            if(data.game_settings?.announcement?.ts > lastAnn) {
                document.getElementById('ann-msg').innerText = data.game_settings.announcement.msg;
                document.getElementById('announcement-box').style.display = 'block';
                lastAnn = data.game_settings.announcement.ts;
            }

            // Sabotage UI
            const sab = data.game_settings?.sabotage;
            const alertBox = document.getElementById('sabo-alert');
            if(sab?.active) {
                alertBox.style.display = 'block';
                document.getElementById('game-ui').className = (myRole !== 'traitor') ? 'screen lights-out' : 'screen';
                document.getElementById('fix-dist').innerText = `LOOP NAAR FIX POINT: ${dist(myLat, myLng, sab.lat, sab.lng).toFixed(0)}m\nStatus: ${sab.fix_count}/3 spelers`;
                
                // Sabotage Timer Logic (3 spelers nodig)
                let fixers = 0;
                for(let id in data.players) if(data.players[id].is_fixing) fixers++;
                db.ref('game_settings/sabotage/fix_count').set(fixers);
                if(fixers >= 3) {
                    if(!sab.timer_start) db.ref('game_settings/sabotage/timer_start').set(Date.now());
                    else if(Date.now() - sab.timer_start > 60000) db.ref('game_settings/sabotage').remove();
                } else {
                    db.ref('game_settings/sabotage/timer_start').remove();
                }
            } else {
                alertBox.style.display = 'none';
                document.getElementById('game-ui').className = 'screen';
            }

            // Radar
            if((myRole==='traitor' || myRole==='post') && myStatus==='alive') {
                document.getElementById('radar-map').style.display = 'block';
                if(!radarMap) {
                    radarMap = L.map('radar-map', {zoomControl: false, attributionControl: false}).setView([myLat, myLng], 18);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
                }
                for(let id in data.players) {
                    const p = data.players[id];
                    if(p.state==='active' && p.status==='alive') {
                        let c = id===myName ? 'lime' : (myRole==='traitor' ? 'red' : 'white');
                        if(markers[id]) markers[id].setLatLng([p.lat, p.lng]);
                        else markers[id] = L.circleMarker([p.lat, p.lng], {radius: 5, color: c}).addTo(radarMap);
                    }
                }
            }
        });

        function triggerSabo() {
            db.ref('players').once('value', s => {
                let lats = [], lngs = [];
                s.forEach(p => { if(p.val().state === 'active' && p.val().role !== 'post') { lats.push(p.val().lat); lngs.push(p.val().lng); }});
                db.ref('game_settings/sabotage').set({ active: true, lat: lats.reduce((a,b)=>a+b)/lats.length, lng: lngs.reduce((a,b)=>a+b)/lngs.length, fix_count: 0 });
            });
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const a = Math.sin(((la2-la1)*Math.PI/180)/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(((lo2-lo1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
