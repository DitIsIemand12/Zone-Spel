<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SUNNYSIDE HUD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        #radar-map { height: 250px; width: 100%; border: 1px solid #f0f; border-radius: 50%; margin: 10px 0; display: none; }
        .btn { border: 2px solid #0f0; background: none; color: #0f0; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .lights-out { filter: brightness(0.05); }
        #sabo-ui { display: none; position: fixed; top: 0; width: 100%; background: red; color: white; padding: 10px; z-index: 100; }
    </style>
</head>
<body>

    <div id="sabo-ui">⚠️ LICHTEN UIT! GA NAAR FIX POINT ⚠️<br><span id="fix-info"></span></div>

    <div id="game-ui" class="screen">
        <h1 id="role-display">LADEN...</h1>
        <div id="score-display">Score: 0</div>
        <div id="radar-map"></div>
        <button id="kill-btn" class="btn" style="border-color:#f0f; color:#f0f; display:none;">ELIMINEER</button>
        <button id="sabo-btn" class="btn" style="border-color:red; color:red; display:none;" onclick="triggerSabo()">SABOTAGE</button>
        <p id="pending-msg" style="display:none; color: orange;">WACHT OP TOELATING VAN SPELLEIDER...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Naam?");
        localStorage.setItem('pName', myName);
        let myLat, myLng, myRole, myStatus, radarMap, markers = {};

        // Alleen aanmelden als we nog niet bestaan
        db.ref('players/'+myName).once('value', s => {
            if(!s.exists()) {
                db.ref('players/'+myName).set({name: myName, state: 'pending', status:'alive', role:'toy', lat:52, lng:5});
            }
        });

        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            db.ref('players/'+myName).update({lat: myLat, lng: myLng});
            if(radarMap) radarMap.panTo([myLat, myLng]);
        }, null, {enableHighAccuracy:true});

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = data.players?.[myName];
            if(!me) return;

            myRole = me.role; myStatus = me.status;
            
            // Toelatings-UI
            if(me.state === 'pending') {
                document.getElementById('role-display').innerText = "SYSTEM IDLE";
                document.getElementById('pending-msg').style.display = 'block';
                return;
            } else {
                document.getElementById('pending-msg').style.display = 'none';
                document.getElementById('role-display').innerText = myRole.toUpperCase();
            }

            document.getElementById('score-display').innerText = "Score: " + (me.points || 0);

            // Traitor Logica
            if(myRole === 'traitor' && myStatus === 'alive') {
                document.getElementById('sabo-btn').style.display = data.game_settings?.sabotage?.active ? 'none' : 'block';
                let vic = null;
                for(let id in data.players) {
                    let p = data.players[id];
                    if(id!==myName && p.status==='alive' && p.role==='toy' && dist(myLat, myLng, p.lat, p.lng) < 10) vic = id;
                }
                const kb = document.getElementById('kill-btn');
                kb.style.display = vic ? 'block' : 'none';
                if(vic) kb.onclick = () => db.ref('players/'+vic).update({status:'dead'});
            }

            // Sabotage UI
            const sab = data.game_settings?.sabotage;
            if(sab?.active) {
                document.getElementById('sabo-ui').style.
