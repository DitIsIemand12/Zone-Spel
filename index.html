<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunnyside HUD</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        .hud { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .lights-out { filter: brightness(0.03); }
        .btn { border: none; padding: 25px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; width: 100%; font-family: 'Courier New'; margin-top: 10px; }
        #kill-btn { background: #ff00ff; color: white; display: none; box-shadow: 0 0 20px #ff00ff; }
        #task-btn { background: #39ff14; color: black; display: none; }
        .btn-sabo { background: #440000; color: red; border: 1px solid red; font-size: 0.8rem; }
        #traitor-panel { display: none; border-top: 1px solid #444; padding-top: 10px; }
        #gas-alert { display: none; background: red; color: white; padding: 10px; position: fixed; top: 0; width: 100%; z-index: 1000; }
    </style>
</head>
<body>
    <div id="gas-alert">⚠️ TOXIC GAS DETECTED ⚠️</div>

    <div class="hud">
        <div>
            <h1 id="role-display">CONNECTING...</h1>
            <div id="status-display">Wachten op GPS...</div>
        </div>

        <div>
            <button id="task-btn" class="btn" onclick="startTask()">TAAK STARTEN</button>
            <button id="kill-btn" class="btn">ELIMINEER DOELWIT</button>
        </div>

        <div id="traitor-panel">
            <p style="color:red">SABOTAGE PANEL</p>
            <button class="btn btn-sabo" onclick="sendSabotage('lights')">LIGHTS OUT</button>
            <button class="btn btn-sabo" onclick="sendSabotage('gas')">GAS LEAK</button>
            <button class="btn btn-sabo" style="color:white" onclick="sendSabotage('none')">FIX SYSTEM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
          authDomain: "tradingpost-57b20.firebaseapp.com",
          databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "tradingpost-57b20",
          storageBucket: "tradingpost-57b20.firebasestorage.app",
          messagingSenderId: "358205969306",
          appId: "1:358205969306:web:b0440ef5815a21d5fca023",
          measurementId: "G-ERK90MPVWR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('playerName') || prompt("Wat is je naam?");
        localStorage.setItem('playerName', myId);

        let myLat, myLng, myRole = 'toy', myStatus = 'alive';

        // GPS opstarten
        navigator.geolocation.watchPosition(pos => {
            myLat = pos.coords.latitude;
            myLng = pos.coords.longitude;
            db.ref('players/' + myId).update({
                lat: myLat, lng: myLng, name: myId, last_seen: Date.now(), 
                role: myRole, status: myStatus
            });
            updateLogic();
        }, err => alert("Zet je GPS aan!"), { enableHighAccuracy: true });

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateLogic() {
            db.ref().once('value', snap => {
                const data = snap.val() || {};
                
                // 1. Taken Check
                const tasks = data.tasks || {};
                let foundTask = null;
                for(let tid in tasks) {
                    if(getDist(myLat, myLng, tasks[tid].lat, tasks[tid].lng) < 15) {
                        foundTask = tasks[tid].name;
                        break;
                    }
                }
                const tb = document.getElementById('task-btn');
                tb.style.display = foundTask ? 'block' : 'none';
                if(foundTask) tb.innerText = "TAAK: " + foundTask;

                // 2. Kill Check
                if(myRole === 'traitor' && myStatus === 'alive') {
                    const players = data.players || {};
                    let victim = null;
                    for(let pid in players) {
                        if(pid !== myId && players[pid].status === 'alive') {
                            if(getDist(myLat, myLng, players[pid].lat, players[pid].lng) < 10) {
                                victim = pid; break;
                            }
                        }
                    }
                    const kb = document.getElementById('kill-btn');
                    kb.style.display = victim ? 'block' : 'none';
                    if(victim) kb.onclick = () => db.ref('players/' + victim).update({status: 'dead'});
                }
            });
        }

        function sendSabotage(type) {
            db.ref('game_settings/sabotage').set({ active: type !== 'none', type: type });
        }

        function startTask() {
            alert("TAAK WORDT UITGEVOERD... (5 sec)");
            setTimeout(() => alert("TAAK VOLTOOID!"), 5000);
        }

        // Luister naar de server
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const me = (data.players && data.players[myId]) ? data.players[myId] : null;
            
            if(me) {
                myRole = me.role || 'toy';
                myStatus = me.status || 'alive';
                document.getElementById('role-display').innerText = myRole.toUpperCase();
                document.getElementById('status-display').innerText = "STATUS: " + myStatus.toUpperCase();
                document.getElementById('traitor-panel').style.display = (myRole === 'traitor') ? 'block' : 'none';
                if(myStatus === 'dead') document.body.style.filter = "grayscale(1) brightness(0.4)";
            }

            const sabo = data.game_settings?.sabotage;
            document.body.classList.toggle('lights-out', sabo?.active && sabo?.type === 'lights' && myRole !== 'traitor');
            document.getElementById('gas-alert').style.display = (sabo?.active && sabo?.type === 'gas') ? 'block' : 'none';
        });
    </script>
</body>
</html>
