<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>POST COMMANDER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: orange; font-family: monospace; text-align: center; margin: 0; padding: 0; }
        .screen { height: 100vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        #radar { height: 250px; width: 100%; border: 1px solid orange; margin-bottom: 10px; border-radius: 10px; }
        .p-box { background: #222; border: 1px solid orange; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        #ann-overlay { display: none; background: orange; color: #000; padding: 10px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ann-overlay">MELDING: <span id="ann-text"></span></div>
    <div class="screen">
        <div id="radar"></div>
        <h3>NABYE SPELERS</h3>
        <div id="list">Wachten...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('pName') || prompt("Naam van deze post?");
        localStorage.setItem('pName', myName);
        let myLat, myLng, radar, markers = {}, lastAnn = 0;
        let lastUpdateTime = 0;
        const throttleTime = 4000;

        db.ref('players/'+myName).once('value', s => {
            if(!s.exists()) db.ref('players/'+myName).set({name: myName, state: 'pending', role: 'post', lat: 52, lng: 5});
        });

        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude; myLng = p.coords.longitude;
            
            const nu = Date.now();
            if (nu - lastUpdateTime > throttleTime) {
                db.ref('players/'+myName).update({lat: myLat, lng: myLng});
                lastUpdateTime = nu;
            }

            if(radar) radar.panTo([myLat, myLng]);
        }, null, {enableHighAccuracy:true});

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const ann = data.game_settings?.announcement;
            if(ann && ann.ts > lastAnn) {
                if(ann.target === 'all' || ann.target === 'post') {
                    document.getElementById('ann-text').innerText = ann.msg;
                    document.getElementById('ann-overlay').style.display = 'block';
                }
                lastAnn = ann.ts;
            }

            if(!radar && myLat) {
                radar = L.map('radar', {zoomControl:false, attributionControl:false}).setView([myLat, myLng], 18);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radar);
            }

            const list = document.getElementById('list'); list.innerHTML = "";
            for(let id in data.players) {
                const p = data.players[id];
                if(p.state === 'active' && p.status === 'alive') {
                    if(radar) {
                        let col = id === myName ? 'blue' : 'white';
                        if(markers[id]) markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                        else markers[id] = L.circleMarker([p.lat, p.lng], {radius:6, color:col, fillOpacity:0.8}).addTo(radar);
                    }
                    if(p.role !== 'post' && dist(myLat, myLng, p.lat, p.lng) < 20) {
                        list.innerHTML += `<div class="p-box">${p.name} (${p.points || 0} pnt) <button onclick="add('${id}')" ${data.game_settings?.sabotage?.active?'disabled':''}>+10</button></div>`;
                    }
                }
            }
        });

        function add(id) { db.ref('players/'+id+'/points').transaction(v => (v||0)+10); }
        function dist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const a = Math.sin(((la2-la1)*Math.PI/180)/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(((lo2-lo1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
