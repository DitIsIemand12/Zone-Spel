<!DOCTYPE html>
<html>
<head>
    <title>SUNNYSIDE MASTER CONTROL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; height: 100vh; }
        #map { flex-grow: 1; background: #111; }
        #sidebar { width: 350px; background: #0a0a0a; border-left: 2px solid #0f0; padding: 15px; overflow-y: auto; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .section { border: 1px solid #333; padding: 10px; margin-bottom: 15px; background: #111; }
        .q-item { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #333; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>MASTER CONTROL</h2>
        <div class="section">
            <h3>WACHTRIJ</h3>
            <div id="queue-list">Wachten op aanmeldingen...</div>
        </div>
        <div class="section">
            <h3>GAME SETUP</h3>
            Verraders: <input type="number" id="t-count" value="1" style="width:40px; background:#000; color:#0f0; border:1px solid #0f0;">
            <button class="btn" style="margin-top:10px" onclick="startGame()">START GAME & ROLLEN</button>
            <button class="btn" style="background:red" onclick="triggerSabo()">SABOTAGE LICHTEN</button>
        </div>
        <div class="section">
            <h3>SCOREBORD</h3>
            <div id="leaderboard"></div>
        </div>
        <button class="btn" style="background:#222; color:#555" onclick="if(confirm('WIPE?')) firebase.database().ref().remove();">RESET GAME</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([52.3, 5.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let markers = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const ps = data.players || {};
            const qList = document.getElementById('queue-list');
            const lBoard = document.getElementById('leaderboard');
            
            qList.innerHTML = ""; lBoard.innerHTML = "";
            let lats = [], lngs = [];

            for(let id in ps) {
                const p = ps[id];
                if(p.state === 'pending') {
                    const typeLabel = p.role === 'post' ? 'POST' : 'SPELER';
                    qList.innerHTML += `<div class="q-item"><span><span class="tag">${typeLabel}</span>${p.name}</span><button onclick="approve('${id}')">TOELATEN</button></div>`;
                } else {
                    if(p.role !== 'post') {
                        lBoard.innerHTML += `<div>${p.name}: ${p.points || 0}</div>`;
                        lats.push(p.lat); lngs.push(p.lng);
                    }
                    let col = p.role==='traitor' ? '#f0f' : (p.role==='post' ? '#ffa500' : '#0ff');
                    if(p.status==='dead') col='#555';
                    if(markers[id]) markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                    else markers[id] = L.circleMarker([p.lat, p.lng], {color: col, radius: 8, fillOpacity: 0.8}).addTo(map).bindTooltip(p.name, {permanent:true});
                }
            }
            window.coords = {lats, lngs};
        });

        function approve(id) { db.ref('players/'+id).update({state: 'active'}); }
        
        function startGame() {
            db.ref('players').once('value', s => {
                let ids = [];
                s.forEach(c => { if(c.val().state === 'active' && c.val().role !== 'post') ids.push(c.key); });
                ids.sort(()=>Math.random()-0.5).forEach((id, i) => {
                    db.ref('players/'+id).update({role: i < document.getElementById('t-count').value ? 'traitor' : 'toy'});
                });
                db.ref('game_settings/state').set('playing');
            });
        }

        function triggerSabo() {
            if(!window.coords.lats.length) return;
            db.ref('game_settings/sabotage').set({
                active: true,
                lat: window.coords.lats.reduce((a,b)=>a+b)/window.coords.lats.length,
                lng: window.coords.lngs.reduce((a,b)=>a+b)/window.coords.lngs.length
            });
        }
    </script>
</body>
</html>
