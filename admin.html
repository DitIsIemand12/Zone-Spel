<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Sunnyside - Admin Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: monospace; display: flex; height: 100vh; }
        #map { flex-grow: 1; }
        #sidebar { width: 320px; padding: 15px; background: #0a0a0a; border-left: 2px solid #39ff14; overflow-y: auto; }
        .btn { background: #39ff14; color: black; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .player-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; font-size: 0.8rem; }
        .tag { padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .toy { background: cyan; color: black; }
        .traitor { background: magenta; color: white; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>CORE CONTROL</h2>
        <div id="db-status">DB Status: Verbinding maken...</div>
        <hr>
        <h3>SPELERS LIVE</h3>
        <div id="player-list">Wachten op data...</div>
        <hr>
        <button class="btn" style="background:orange" onclick="setAllToToy()">RESET IEDEREEN NAAR TOY</button>
        <button class="btn" style="background:red; color:white;" onclick="resetAll()">WIS ALLES (HARD RESET)</button>
        <p style="font-size: 0.7rem; color: #888; margin-top: 20px;">
            HULP: Klik op de kaart om een taak te plaatsen. Spelers moeten binnen 15m komen.
        </p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Check verbinding
        db.ref(".info/connected").on("value", (snap) => {
            document.getElementById('db-status').innerText = snap.val() ? "DB Status: VERBONDEN ✅" : "DB Status: GEEN VERBINDING ❌";
        });

        const map = L.map('map').setView([52.3, 5.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let markers = {};
        let taskMarkers = [];

        // Taak toevoegen
        map.on('click', e => {
            const taskName = prompt("Naam van de opdracht:");
            if(!taskName) return;
            const taskType = prompt("Type (1: Draden, 2: Code, 3: Upload):", "1");
            
            db.ref('tasks').push({
                name: taskName,
                type: taskType,
                lat: e.latlng.lat,
                lng: e.latlng.lng
            });
        });

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            
            // Spelers bijwerken
            const players = data.players || {};
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            
            for(let id in players) {
                const p = players[id];
                const col = p.status === 'dead' ? 'gray' : (p.role === 'traitor' ? 'magenta' : 'cyan');
                
                if(markers[id]) {
                    markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                } else {
                    markers[id] = L.circleMarker([p.lat, p.lng], {color: col, radius: 10, fillOpacity: 0.8}).addTo(map).bindTooltip(p.name, {permanent: true});
                    map.panTo([p.lat, p.lng]);
                }
                
                list.innerHTML += `
                    <div class="player-card">
                        <strong>${p.name}</strong> <span class="tag ${p.role}">${p.role}</span><br>
                        Status: ${p.status}<br>
                        <button onclick="makeTraitor('${id}')">Maak Verrader</button>
                    </div>`;
            }

            // Taken bijwerken
            taskMarkers.forEach(m => map.removeLayer(m));
            taskMarkers = [];
            const tasks = data.tasks || {};
            for(let tid in tasks) {
                const t = tasks[tid];
                const tm = L.marker([t.lat, t.lng], {
                    icon: L.divIcon({html: "⭐", className: 'task-marker'})
                }).addTo(map).bindTooltip(t.name);
                taskMarkers.push(tm);
            }
        });

        function makeTraitor(id) { db.ref('players/'+id).update({role: 'traitor'}); }
        function setAllToToy() {
            db.ref('players').once('value', s => {
                s.forEach(child => { child.ref.update({role: 'toy', status: 'alive'}); });
            });
        }
        function resetAll() { if(confirm("ALLES WISSEN?")) db.ref().remove(); }
    </script>
</body>
</html>
