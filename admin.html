<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Sunnyside - Admin Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: 'Courier New', monospace; display: flex; }
        #map { height: 100vh; flex-grow: 1; }
        #sidebar { width: 300px; padding: 15px; background: #0a0a0a; border-left: 2px solid #39ff14; }
        .btn { background: #39ff14; color: black; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>ADMIN CONSOLE</h2>
        <p>Klik op de kaart om een taak te plaatsen.</p>
        <div id="player-list"></div>
        <hr>
        <button class="btn" style="background:red; color:white;" onclick="resetAll()">RESET GAME (WIST ALLES)</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { /* GEBRUIK JE EIGEN CONFIG HIER */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([52.3, 5.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let markers = {};
        let taskMarkers = [];

        // Taak toevoegen op klik
        map.on('click', e => {
            const name = prompt("Naam van deze taak:");
            if(name) db.ref('tasks').push({ name, lat: e.latlng.lat, lng: e.latlng.lng });
        });

        // Live Kaart Updates
        db.ref().on('value', snap => {
            const data = snap.val();
            if(!data) return;

            // Spelers tekenen
            const players = data.players || {};
            for(let id in players) {
                const p = players[id];
                const col = p.status === 'dead' ? 'gray' : (p.role === 'traitor' ? 'magenta' : 'cyan');
                if(markers[id]) markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                else markers[id] = L.circleMarker([p.lat, p.lng], {color: col, radius: 10, fillOpacity: 0.8}).addTo(map).bindTooltip(p.name, {permanent: true});
            }

            // Taken tekenen (opgeslagen in Firebase)
            taskMarkers.forEach(m => map.removeLayer(m));
            taskMarkers = [];
            const tasks = data.tasks || {};
            for(let tid in tasks) {
                const t = tasks[tid];
                const tm = L.marker([t.lat, t.lng], {
                    icon: L.divIcon({html: "⭐", className: 'task-marker'})
                }).addTo(map).bindTooltip(t.name);
                taskMarkers.push(tm);
            }
        });

        function resetAll() { if(confirm("Alles wissen?")) db.ref().remove(); }
    </script>
</body>
</html>
