<!DOCTYPE html>
<html>
<head>
    <title>SUNNYSIDE ADMIN - CONTROL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; height: 100vh; }
        #map { flex-grow: 1; background: #111; }
        #sidebar { width: 350px; background: #0a0a0a; border-left: 2px solid #0f0; padding: 15px; overflow-y: auto; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .section { border: 1px solid #333; padding: 10px; margin-bottom: 15px; }
        .player-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>CORE CONTROL</h2>
        <div class="section">
            <h3>LOBBY & ROLLEN</h3>
            Verraders: <input type="number" id="t-count" value="1" style="width:40px; background:#222; color:#0f0;">
            <button class="btn" onclick="assignRoles()">VERDEEL ROLLEN & START</button>
        </div>
        <div class="section">
            <h3>SCOREBORD</h3>
            <div id="leaderboard">Laden...</div>
        </div>
        <div class="section">
            <h3>WACHTRIJ</h3>
            <div id="queue-list"></div>
        </div>
        <button class="btn" style="background:red; color:white;" onclick="db.ref().remove()">RESET ALLES</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([52.3, 5.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let markers = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const ps = data.players || {};
            const queueList = document.getElementById('queue-list');
            const leaderboard = document.getElementById('leaderboard');
            
            queueList.innerHTML = "";
            let scores = [];

            for(let id in ps) {
                const p = ps[id];
                if(p.state === 'active') {
                    scores.push({name: p.name, pts: p.points || 0});
                    const col = p.status === 'dead' ? '#555' : (p.role === 'traitor' ? '#f0f' : '#0ff');
                    if(markers[id]) markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                    else markers[id] = L.circleMarker([p.lat, p.lng], {color: col, radius: 10}).addTo(map).bindTooltip(p.name, {permanent:true});
                } else {
                    queueList.innerHTML += `<div class="player-row">${p.name} <button onclick="approve('${id}')">Check-in</button></div>`;
                }
            }
            
            scores.sort((a,b) => b.pts - a.pts);
            leaderboard.innerHTML = scores.map(s => `<div>${s.name}: ${s.pts} pnt</div>`).join('');
        });

        function approve(id) { db.ref('players/'+id).update({state: 'active', points: 0, status: 'alive', role: 'toy'}); }
        
        function assignRoles() {
            db.ref('players').once('value', snap => {
                let ids = [];
                snap.forEach(c => { if(c.val().state === 'active') ids.push(c.key); });
                ids.sort(() => Math.random() - 0.5);
                const count = document.getElementById('t-count').value;
                ids.forEach((id, i) => db.ref('players/'+id).update({role: i < count ? 'traitor' : 'toy'}));
                db.ref('game_settings').update({state: 'playing'});
            });
        }
    </script>
</body>
</html>
