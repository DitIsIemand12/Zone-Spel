<!DOCTYPE html>
<html>
<head>
    <title>SUNNYSIDE MASTER CONTROL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; height: 100vh; }
        #map { flex-grow: 1; background: #111; }
        #sidebar { width: 350px; background: #0a0a0a; border-left: 2px solid #0f0; padding: 15px; overflow-y: auto; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .section { border: 1px solid #333; padding: 10px; margin-bottom: 15px; background: #111; }
        .q-item { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        input, select { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; margin-bottom: 5px; }
        .clickable-name { cursor: pointer; text-decoration: underline; color: #0ff; }
        #total-score { font-size: 18px; color: yellow; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>MASTER CONTROL</h2>
        
        <div class="section">
            <h3>📢 OMROEPEN</h3>
            <select id="ann-target" style="width:100%">
                <option value="all">Iedereen</option>
                <option value="player">Alle Spelers (Toys + Traitors)</option>
                <option value="toy">Alleen Toys</option>
                <option value="traitor">Alleen Verraders</option>
                <option value="post">Alleen Posten</option>
            </select>
            <input type="text" id="ann-msg" style="width:70%" placeholder="Typ bericht...">
            <button class="btn" style="width:25%; display:inline;" onclick="sendAnn()">OK</button>
        </div>

        <div class="section">
            <div id="total-score">Totaal Toys: 0</div>
            Kill Beloning: <input type="number" id="kill-val" value="50" onchange="updateKillVal(this.value)">
        </div>

        <div class="section">
            <h3>WACHTRIJ</h3>
            <div id="queue-list">Wachten...</div>
        </div>

        <div class="section">
            <h3>SCOREBORD (Klik naam)</h3>
            <div id="leaderboard"></div>
        </div>

        <button class="btn" onclick="startGame()">START GAME & ROLLEN</button>
        <button class="btn" style="background:red" onclick="triggerSabo()">SABOTAGE</button>
        <button class="btn" style="background:#222; color:#555" onclick="if(confirm('WIPE?')) db.ref().remove();">RESET GAME</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
            authDomain: "tradingpost-57b20.firebaseapp.com",
            databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tradingpost-57b20",
            storageBucket: "tradingpost-57b20.firebasestorage.app",
            messagingSenderId: "358205969306",
            appId: "1:358205969306:web:b0440ef5815a21d5fca023"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([52.3, 5.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let markers = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const ps = data.players || {};
            const qList = document.getElementById('queue-list');
            const lBoard = document.getElementById('leaderboard');
            
            qList.innerHTML = ""; lBoard.innerHTML = "";
            let lats = [], lngs = [], totalToyPoints = 0;

            for(let id in ps) {
                const p = ps[id];
                if(p.state === 'pending') {
                    qList.innerHTML += `<div class="q-item">${p.name} (${p.role}) <button onclick="approve('${id}')">OK</button></div>`;
                } else {
                    if(p.role !== 'post') {
                        if(p.role === 'toy') totalToyPoints += (p.points || 0);
                        lBoard.innerHTML += `<div><span class="clickable-name" onclick="editPoints('${id}', ${p.points || 0})">${p.name}</span>: ${p.points || 0} (${p.role})</div>`;
                        lats.push(p.lat); lngs.push(p.lng);
                    }
                    
                    // ADMIN KLEUREN: Geel (Post), Roze (Traitor), Groen (Toy)
                    let col = '#0f0'; // Toy = Groen
                    if(p.role === 'traitor') col = '#f0f'; // Traitor = Roze
                    if(p.role === 'post') col = '#ff0'; // Post = Geel
                    if(p.status === 'dead') col = '#555';

                    if(markers[id]) {
                        markers[id].setLatLng([p.lat, p.lng]).setStyle({color: col, fillColor: col});
                    } else {
                        markers[id] = L.circleMarker([p.lat, p.lng], {color: col, radius: 8, fillOpacity: 0.8}).addTo(map).bindTooltip(p.name, {permanent:true});
                    }
                }
            }
            document.getElementById('total-score').innerText = "Totaal Toys: " + totalToyPoints;
            window.coords = {lats, lngs};
        });

        function approve(id) { db.ref('players/'+id).update({state: 'active'}); }
        function editPoints(id, current) {
            const nieuw = prompt("Score voor " + id + ":", current);
            if(nieuw !== null) db.ref('players/'+id+'/points').set(parseInt(nieuw));
        }
        function sendAnn() { 
            const msg = document.getElementById('ann-msg').value;
            const target = document.getElementById('ann-target').value;
            db.ref('game_settings/announcement').set({ msg, target, ts: Date.now() }); 
        }
        function updateKillVal(val) { db.ref('game_settings/kill_reward').set(parseInt(val)); }
        function startGame() {
            db.ref('players').once('value', s => {
                let ids = [];
                s.forEach(c => { if(c.val().state === 'active' && c.val().role !== 'post') ids.push(c.key); });
                ids.sort(()=>Math.random()-0.5).forEach((id, i) => {
                    db.ref('players/'+id).update({role: i < 1 ? 'traitor' : 'toy'});
                });
                db.ref('game_settings/state').set('playing');
            });
        }
        function triggerSabo() {
            if(!window.coords.lats.length) return;
            db.ref('game_settings/sabotage').set({
                active: true,
                lat: window.coords.lats.reduce((a,b)=>a+b)/window.coords.lats.length,
                lng: window.coords.lngs.reduce((a,b)=>a+b)/window.coords.lngs.length
            });
        }
    </script>
</body>
</html>
